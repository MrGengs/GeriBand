<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <link rel="shortcut icon" href="assets/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/icon-16.png">
  <link rel="icon" type="image/png" sizes="96x96" href="assets/icon-96.png">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="assets/icon-512.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#6499e9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="GeriBand">
  <meta name="description" content="GeriBand - Smart Fall Detection for Elderly Safety">
  <title>GeriBand</title>
  <link rel="stylesheet" href="assets/style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>

<!-- ═══ App Loading Overlay (shown until auth state resolves) ═══ -->
<div id="app-loading">
  <div class="load-logo-wrap">
    <img src="assets/icon.png" alt="GeriBand" style="width:64px;height:64px;object-fit:contain;">
  </div>
  <div style="text-align:center;">
    <div style="font-size:1.1rem;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--primary-dark));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">GeriBand</div>
    <div class="load-text">Memuat aplikasi...</div>
  </div>
  <div class="spinner"></div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Modal Overlay -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div id="modalContent"></div>
  </div>
</div>

<!-- App Shell -->
<div id="app" style="display:none;">

  <!-- Header -->
  <header class="app-header">
    <div class="header-logo">
      <div class="header-logo-icon">
        <img src="assets/icon.png" alt="GeriBand" style="width:28px;height:28px;object-fit:contain;">
      </div>
      <div>
        <div class="header-title">GeriBand</div>
        <div class="header-subtitle" id="header-subtitle">Smart Fall Detection</div>
      </div>
    </div>
    <div class="header-actions">
      <div class="ble-dot disconnected" id="bleDot" title="BLE Status"></div>
      <button class="icon-btn" id="notifBtn" onclick="App.showNotifInfo()" title="Notifikasi">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="badge" id="notifBadge" style="display:none"></span>
      </button>
      <!-- User Avatar -->
      <div class="header-avatar" id="headerAvatar" onclick="App.navigate('settings')" title="Profil">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
    </div>
  </header>

  <!-- Main Content Area -->
  <main id="app-content">
    <section class="page" id="page-dashboard" data-page="dashboard"></section>
    <section class="page" id="page-monitor"   data-page="monitor"></section>
    <section class="page" id="page-history"   data-page="history"></section>
    <section class="page" id="page-device"    data-page="device"></section>
    <section class="page" id="page-settings"  data-page="settings"></section>
  </main>

  <!-- PWA Install Banner -->
  <div class="pwa-banner" id="pwaBanner" style="display:none;">
    <div class="pwa-banner-inner">
      <img src="assets/icon.png" alt="GeriBand" class="pwa-banner-icon">
      <div class="pwa-banner-info">
        <div class="pwa-banner-title">Install GeriBand</div>
        <div class="pwa-banner-desc" id="pwa-banner-desc">Pasang sebagai aplikasi untuk akses cepat</div>
      </div>
      <div class="pwa-banner-actions">
        <button class="pwa-btn-install" id="pwaBtnInstall" onclick="App.installPWA()">Install</button>
        <button class="pwa-btn-later" onclick="App.dismissPWA()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav" id="bottomNav">

    <div class="sidebar-brand" aria-hidden="true">
      <img src="assets/icon.png" alt="GeriBand">
      <span>GeriBand</span>
    </div>

    <button class="nav-item active" id="nav-dashboard" onclick="App.navigate('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9,22 9,12 15,12 15,22"/>
      </svg>
      <span data-i18n="nav.home">Beranda</span>
    </button>

    <button class="nav-item" id="nav-monitor" onclick="App.navigate('monitor')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/>
      </svg>
      <span data-i18n="nav.monitor">Monitor</span>
    </button>

    <button class="nav-item" id="nav-history" onclick="App.navigate('history')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12,6 12,12 16,14"/>
      </svg>
      <span data-i18n="nav.history">Riwayat</span>
    </button>

    <button class="nav-item" id="nav-device" onclick="App.navigate('device')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6.5,6.5 17.5,17.5"/>
        <polyline points="17.5,6.5 6.5,17.5"/>
        <path d="M12 3 L12 21"/>
        <path d="M12 3 L18 9"/>
        <path d="M12 3 L6 9"/>
        <path d="M12 21 L18 15"/>
        <path d="M12 21 L6 15"/>
      </svg>
      <span data-i18n="nav.device">Perangkat</span>
    </button>

    <button class="nav-item" id="nav-settings" onclick="App.navigate('settings')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      <span data-i18n="nav.settings">Pengaturan</span>
    </button>

  </nav>
</div>

<!-- ═══ Firebase Compat SDKs ═══ -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="script/firebase-config.local.js"></script>
<script src="script/firebase-config.js"></script>

<!-- ═══ App Scripts ═══ -->
<script src="script/i18n.js"></script>
<script src="script/ble.js"></script>
<script src="script/notifications.js"></script>
<script src="script/dashboard.js"></script>
<script src="script/monitor.js"></script>
<script src="script/history.js"></script>
<script src="script/device.js"></script>
<script src="script/settings.js"></script>
<script src="script/app.js"></script>

</body>
</html>
