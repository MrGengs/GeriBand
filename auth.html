<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <link rel="shortcut icon" href="assets/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/icon-16.png">
  <link rel="icon" type="image/png" sizes="96x96" href="assets/icon-96.png">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="assets/icon-512.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#6499e9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Masuk — GeriBand</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

<div class="auth-page">

  <!-- Logo Section -->
  <div class="auth-logo-section">
    <div class="auth-logo-wrap">
      <img src="assets/icon.png" alt="GeriBand" style="width:52px;height:52px;object-fit:contain;">
    </div>
    <div class="auth-app-name">GeriBand</div>
    <div class="auth-app-tagline">Seamless Safety for the Golden Years</div>
  </div>

  <!-- Auth Card -->
  <div class="auth-card">

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login"    onclick="AuthUI.switchTab('login')">Masuk</button>
      <button class="auth-tab"        id="tab-register" onclick="AuthUI.switchTab('register')">Daftar</button>
    </div>

    <!-- ── LOGIN FORM ── -->
    <div class="auth-form active" id="form-login">
      <div class="auth-error" id="login-error">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="login-error-msg">Error</span>
      </div>

      <div class="input-group">
        <label class="input-label">Email</label>
        <div class="input-wrap">
          <input class="input-field" id="login-email" type="email" placeholder="email@contoh.com" autocomplete="email" inputmode="email">
          <div class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </div>
        </div>
      </div>

      <div class="input-group">
        <label class="input-label">Password</label>
        <div class="pw-wrap">
          <input class="input-field" id="login-password" type="password" placeholder="Masukkan password" autocomplete="current-password">
          <button class="pw-toggle" type="button" onclick="AuthUI.togglePw('login-password', this)" tabindex="-1">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="auth-forgot">
        <button onclick="AuthUI.forgotPassword()" type="button">Lupa password?</button>
      </div>

      <button class="btn btn-primary" id="login-btn" onclick="AuthUI.login()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="18" height="18"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10,17 15,12 10,7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        <span id="login-btn-text">Masuk Sekarang</span>
      </button>

      <div class="auth-divider">atau</div>

      <button class="google-btn" id="login-google-btn" onclick="AuthUI.loginWithGoogle()" type="button">
        <!-- Google Logo SVG -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.29-8.16 2.29-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          <path fill="none" d="M0 0h48v48H0z"/>
        </svg>
        Masuk dengan Google
      </button>
    </div>

    <!-- ── REGISTER FORM ── -->
    <div class="auth-form" id="form-register">
      <div class="auth-error" id="register-error">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="register-error-msg">Error</span>
      </div>
      <div class="auth-success" id="register-success">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22,4 12,14.01 9,11.01"/></svg>
        <span>Akun berhasil dibuat! Mengalihkan...</span>
      </div>

      <div class="input-group">
        <label class="input-label">Nama Anda (Pemantau)</label>
        <div class="input-wrap">
          <input class="input-field" id="reg-name" type="text" placeholder="Nama Anda sebagai pemantau" autocomplete="name" maxlength="50">
          <div class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
        </div>
      </div>

      <div class="input-group">
        <label class="input-label">Email</label>
        <div class="input-wrap">
          <input class="input-field" id="reg-email" type="email" placeholder="email@contoh.com" autocomplete="email" inputmode="email">
          <div class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </div>
        </div>
      </div>

      <div class="input-group">
        <label class="input-label">Password</label>
        <div class="pw-wrap">
          <input class="input-field" id="reg-password" type="password" placeholder="Minimal 6 karakter" autocomplete="new-password">
          <button class="pw-toggle" type="button" onclick="AuthUI.togglePw('reg-password', this)" tabindex="-1">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="input-group">
        <label class="input-label">Konfirmasi Password</label>
        <div class="pw-wrap">
          <input class="input-field" id="reg-confirm" type="password" placeholder="Ulangi password" autocomplete="new-password">
          <button class="pw-toggle" type="button" onclick="AuthUI.togglePw('reg-confirm', this)" tabindex="-1">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button class="btn btn-primary" id="register-btn" onclick="AuthUI.register()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="18" height="18"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
        <span id="register-btn-text">Buat Akun</span>
      </button>

      <div class="auth-divider">atau</div>

      <button class="google-btn" id="reg-google-btn" onclick="AuthUI.loginWithGoogle()" type="button">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.29-8.16 2.29-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Daftar dengan Google
      </button>
    </div>

  </div><!-- /auth-card -->

  <!-- Footer -->
  <div class="auth-footer">
    <strong style="color:var(--text-muted);display:block;margin-bottom:4px;">GeriBand — Smart Fall Detection</strong>
    Aplikasi pemantau jatuh untuk orang tua lansia. Orang tua cukup memakai sabuk — Anda yang memantau dari sini.
  </div>

</div><!-- /auth-page -->

<!-- Firebase Compat SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="script/firebase-config.local.js"></script>
<script src="script/firebase-config.js"></script>
<script src="script/i18n.js"></script>
<script src="script/auth.js"></script>

</body>
</html>
